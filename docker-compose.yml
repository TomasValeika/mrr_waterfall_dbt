services:
  postgres:
    image: postgres:16
    container_name: local-database
    restart: unless-stopped

    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin 
      PGDATA: /var/lib/postgresql/data/pgdata

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d mydb"]
      interval: 1m30s
      timeout: 30s
      retries: 5

volumes:
  postgres_data: